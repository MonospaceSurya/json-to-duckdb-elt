config:
  send_anonymous_usage_stats: False
  
analytics_transform:
  target: dev_duckdb
  outputs:
    dev_duckdb:
      type: duckdb
      path: "{{ env_var('DBT_DB_PATH', '../db/my_pipeline.duckdb') }}"
    dev_sqlite:
      type: sqlite
      threads: 1
      database: 'my_pipeline'
      schema: 'main'
      schema_directory: '../db'
      schemas_and_paths:
        main: "{{ env_var('DBT_DB_PATH', '../db/my_pipeline.db') }}"
